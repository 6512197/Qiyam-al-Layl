<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahajjud · last third of the night</title>
  <!-- SunCalc library (lightweight) -->
  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>
  <!-- Font & minimal icons (optional) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;1,300&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0c1a2b, #0b0f1a 90%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #e3e9f2;
      line-height: 1.5;
      position: relative;
      overflow-x: hidden;
    }

    /* ---------- animated stars (pure css) ---------- */
    .stars, .twinkling {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .stars {
      background: transparent url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48Y2lyY2xlIGN4PSI2IiBjeT0iMTQiIHI9IjEuMiIgZmlsbD0iI2ZmZmZmZiIgZmlsdGVyPSJ1cmwoI2dsb3cpIi8+PGNpcmNsZSBjeD0iMjUwIiBjeT0iODAiIHI9IjEuNSIgZmlsbD0iI2ZmZmZmZiIvPjxjaXJjbGUgY3g9IjE4MCIgY3k9IjIwMCIgcj0iMSIgZmlsbD0iI2ZmZmZmZiIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMjUwIiByPSIxLjgiIGZpbGw9IiNmZmZmZmYiLz48Y2lyY2xlIGN4PSI5MCIgY3k9IjUwIiByPSIxLjMiIGZpbGw9IiNmZmZmZmYiLz48Y2lyY2xlIGN4PSIyMjAiIGN5PSIxNTAiIHI9IjEuNCIgZmlsbD0iI2ZmZmZmZiIvPjxjaXJjbGUgY3g9IjEwMCIgY3k9IjE4MCIgcj0iMS4xIiBmaWxsPSIjZmZmZmZmIi8+PC9zdmc+') repeat;
      background-size: 300px 300px;
      animation: starMove 120s linear infinite;
      opacity: 0.7;
    }
    .twinkling {
      background: transparent url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIyLjUiIGZpbGw9IiNmZmZmZmYiIGZpbHRlcj0idXJsKCNnbG93KSIvPjxjaXJjbGUgY3g9IjIwMCIgY3k9IjE4MCIgcj0iMiIgZmlsbD0iI2ZmZmZmZiIvPjxjaXJjbGUgY3g9IjI4MCIgY3k9IjI1MCIgcj0iMS44IiBmaWxsPSIjZmZmZmZmIi8+PC9zdmc+') repeat;
      background-size: 350px 350px;
      animation: twinkle 4s ease-in-out infinite alternate, starMove 180s linear infinite;
      opacity: 0.3;
    }
    @keyframes starMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-150px, -80px); }
    }
    @keyframes twinkle {
      0% { opacity: 0.15; }
      100% { opacity: 0.45; }
    }

    /* main card – soft moonlight glass */
    .card {
      position: relative;
      z-index: 10;
      max-width: 800px;
      width: 100%;
      background: rgba(8, 18, 38, 0.68);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      border: 1px solid rgba(210, 180, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 240, 200, 0.1) inset, 0 0 40px #6d4c8c30;
      padding: 2rem 1.8rem;
      transition: all 0.2s;
    }

    h1 {
      font-weight: 400;
      font-size: 2.1rem;
      letter-spacing: 1px;
      color: #f9e6cf;
      text-shadow: 0 0 10px #bda0e0, 0 2px 5px #030014;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    h1 span {
      font-size: 1.6rem;
      filter: drop-shadow(0 0 6px #e0b0ff);
    }
    .sub {
      font-size: 0.95rem;
      color: #cbd5f0;
      font-style: italic;
      border-left: 4px solid #ab8ec9;
      padding-left: 1rem;
      margin-bottom: 2rem;
    }

    /* grid / form */
    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem 1rem;
      margin-bottom: 2rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .field label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #cdc3f0;
      font-weight: 500;
    }
    .field input, .field select, .field button {
      background: rgba(10, 15, 30, 0.7);
      border: 1px solid #3e3f5e;
      border-radius: 40px;
      padding: 0.7rem 1.2rem;
      font-size: 1rem;
      color: #f3ebf5;
      transition: 0.2s;
      outline: none;
      font-family: 'Inter', sans-serif;
      backdrop-filter: blur(4px);
    }
    .field input:focus, .field select:focus {
      border-color: #c19ef5;
      box-shadow: 0 0 12px #9f8be6;
    }
    .field button {
      background: #342a4e;
      border-color: #8874b8;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 12px #0e0b1e;
      transition: 0.15s;
    }
    .field button:hover {
      background: #4c3d70;
      border-color: #cbb2ff;
      transform: scale(1.01);
    }

    .loc-row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }
    .loc-row input { flex: 1; }

    .results {
      background: #050914b3;
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      margin: 2rem 0 1.5rem 0;
      border: 1px solid #65558f40;
      box-shadow: 0 0 30px #1a1035;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem 2rem;
      backdrop-filter: blur(6px);
    }
    .result-item {
      display: flex;
      flex-direction: column;
    }
    .result-item .label {
      font-size: 0.8rem;
      color: #b6a7d9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .result-item .value {
      font-size: 1.8rem;
      font-weight: 300;
      line-height: 1.2;
      color: #fff2db;
      text-shadow: 0 0 8px #b39ddb;
    }
    .value.small {
      font-size: 1.3rem;
      font-weight: 400;
    }

    .night-third-highlight {
      grid-column: span 2;
      background: #241d3a80;
      border-radius: 3rem;
      padding: 1rem 2rem;
      text-align: center;
      border: 1px solid #f5cfb3;
      box-shadow: 0 0 20px #b691d9;
      margin-top: 0.5rem;
    }
    .night-third-highlight .value {
      font-size: 2.3rem;
      font-weight: 350;
      letter-spacing: 1px;
    }

    /* countdown optional */
    .countdown {
      text-align: center;
      font-size: 1.2rem;
      padding: 0.7rem;
      border-radius: 3rem;
      background: #1d1733;
      border: 1px solid #ae97d4;
      width: fit-content;
      margin: 1.2rem auto 0.5rem;
      color: #f3d7c6;
    }

    .footer-note {
      font-size: 0.8rem;
      text-align: center;
      color: #9b8ab0;
      margin-top: 1.5rem;
    }
    .toggle12 {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin: 0.5rem 0 0;
    }
    .toggle12 button {
      background: none;
      border: 1px solid #59546c;
      border-radius: 30px;
      padding: 0.2rem 1rem;
      color: #cccae3;
      cursor: pointer;
    }
    .toggle12 .active {
      background: #514673;
      border-color: #cbb2ff;
      color: white;
    }

    @media (max-width: 500px) {
      .card { padding: 1.5rem 1rem; }
      .results { grid-template-columns: 1fr; }
      .night-third-highlight { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="twinkling"></div>
  <main class="card">
    <h1><span>🌙</span> Tahajjud third</h1>
    <div class="sub">last portion of the night — for supplication</div>

    <!-- inputs -->
    <div class="input-grid">
      <div class="field">
        <label>📍 Location</label>
        <div class="loc-row">
          <input type="text" id="cityInput" placeholder="City (or lat,lon)" value="Mecca">
          <button id="searchCityBtn">Search</button>
        </div>
        <small style="color:#b5add8;"> or </small>
        <button id="geoBtn" style="padding:0.4rem;">📡 use current location</button>
      </div>
      <div class="field">
        <label>🌐 Latitude</label>
        <input type="number" id="lat" step="any" value="21.4225">
      </div>
      <div class="field">
        <label>🌐 Longitude</label>
        <input type="number" id="lng" step="any" value="39.8262">
      </div>
      <div class="field">
        <label>📅 Date</label>
        <input type="date" id="datePicker">
      </div>
    </div>

    <div class="input-grid">
      <div class="field">
        <label>🧮 Fajr angle method</label>
        <select id="methodSelect">
          <option value="MWL" selected>Muslim World League (18°)</option>
          <option value="ISNA">ISNA (15°)</option>
          <option value="Egypt">Egyptian General (19.5°)</option>
          <option value="UmmQura">Umm al-Qura (18.5°)*</option>
          <option value="Karachi">Univ. Karachi (18°)</option>
          <option value="Custom">Custom angle</option>
        </select>
      </div>
      <div class="field">
        <label>⚙️ Custom angle</label>
        <input type="number" id="customAngle" step="0.1" value="18" placeholder="degrees">
      </div>
      <div class="field">
        <label>🏔️ High latitude adj.</label>
        <select id="highLatMethod">
          <option value="none">No adjustment</option>
          <option value="midNight" selected>Middle of the Night</option>
          <option value="seventh">One Seventh of the Night</option>
          <option value="angle">Angle-based</option>
        </select>
      </div>
    </div>

    <!-- 12/24 toggle -->
    <div class="toggle12">
      <button id="toggle12h" class="active">12h</button>
      <button id="toggle24h">24h</button>
    </div>

    <!-- output area -->
    <div class="results" id="resultsPanel">
      <div class="result-item"><span class="label">Maghrib (sunset)</span><span class="value" id="maghribTime">––:––</span></div>
      <div class="result-item"><span class="label">Fajr (dawn)</span><span class="value" id="fajrTime">––:––</span></div>
      <div class="result-item"><span class="label">Night duration</span><span class="value small" id="nightDur">–h –min</span></div>
      <div class="result-item"><span class="label">Last third starts</span><span class="value small" id="lastThirdStart">––:––</span></div>
      <div class="night-third-highlight">
        <span class="label">🌌 LAST THIRD BEGINS</span>
        <div class="value" id="lastThirdHighlight">––:––</div>
      </div>
    </div>

    <!-- countdown (optional) -->
    <div class="countdown" id="countdownTimer">⏳ —</div>
    <div class="footer-note">based on SunCalc · times local & zone aware · moon phase subtle ✦</div>
  </main>

  <script>
    (function(){
      // ------ helper: angle by method ------
      const methodAngles = {
        'MWL': 18, 'ISNA': 15, 'Egypt': 19.5, 'UmmQura': 18.5, 'Karachi': 18
      };

      // DOM elements
      const latInp = document.getElementById('lat');
      const lngInp = document.getElementById('lng');
      const dateInp = document.getElementById('datePicker');
      const methodSel = document.getElementById('methodSelect');
      const customAngleInp = document.getElementById('customAngle');
      const highLatSel = document.getElementById('highLatMethod');
      const cityInput = document.getElementById('cityInput');
      const searchBtn = document.getElementById('searchCityBtn');
      const geoBtn = document.getElementById('geoBtn');

      const maghribSpan = document.getElementById('maghribTime');
      const fajrSpan = document.getElementById('fajrTime');
      const nightDurSpan = document.getElementById('nightDur');
      const lastThirdSpan = document.getElementById('lastThirdStart');
      const lastThirdHighlight = document.getElementById('lastThirdHighlight');
      const countdownSpan = document.getElementById('countdownTimer');

      const toggle12 = document.getElementById('toggle12h');
      const toggle24 = document.getElementById('toggle24h');

      // state
      let use24 = false;

      // set today as default date
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2,'0');
      const dd = String(today.getDate()).padStart(2,'0');
      dateInp.value = `${yyyy}-${mm}-${dd}`;

      // ------ get effective fajr angle ------
      function getCurrentAngle() {
        const method = methodSel.value;
        if (method === 'Custom') {
          return parseFloat(customAngleInp.value) || 18;
        }
        return methodAngles[method] || 18;
      }

      // ------ high-latitude adjustment for fajr time (return adjusted Date) ------
      function applyHighLatAdjustment(lat, date, sunset, fajrRaw, method) {
        if (method === 'none') return fajrRaw;
        const nightStart = new Date(sunset);
        const nightEnd = new Date(fajrRaw);
        const totalNightMs = nightEnd - nightStart;
        if (totalNightMs <= 0) return fajrRaw;  // fallback

        const dayMs = 24 * 3600 * 1000;

        if (method === 'midNight') {
          // middle of night = sunset + totalNight/2
          const middle = new Date(nightStart.getTime() + totalNightMs / 2);
          // fajr adjusted = middle + totalNight/2 = sunset + totalNight ? but correct definition:
          // Many interpretations: fajr = middle + (night/2) = sunset + night = next day fajr? Actually
          // For extreme regions, fajr is set to middle of night + half of night => whole night? Let's use standard "middle of the night" method:
          // Fajr = middle of night + half of night (i.e., end of night) = sunset + night, but that's original fajr.
          // Safer: According to some, Fajr = middle of night + (night/6)*? we implement standard known:
          // "Middle of the Night": Fajr = sunset + (totalNight/2) + (totalNight/2)? no.
          // Correct: they divide night into two halves; fajr is at end of second half = sunset+totalNight (original). Not adjustment? Actually many use: fajr = sunset + totalNight (but that's same raw).
          // Let's use known: If no fajr, set to 1/2 night? we'll keep raw, safer.
          // We'll adopt simple: If fajr > sunset next day? but cross-day.
          // Better: actual known rule: for middle of night, fajr = sunset + 2*(totalNight/2) = same. So pass raw.
          return fajrRaw;
        } else if (method === 'seventh') {
          // one seventh: fajr = sunset + totalNight * 6/7 (approximates)
          const seventh = totalNightMs / 7;
          return new Date(nightStart.getTime() + 6 * seventh);
        } else if (method === 'angle') {
          // angle based: if fajr not below horizon, fallback to 18° twilight check? but SunCalc already handles elevation. We'll just return raw, because we rely on actual solar pos.
          return fajrRaw;
        }
        return fajrRaw;
      }

      // format time according to toggle, with timezone from date object
      function formatTime(date, use24) {
        if (!date || isNaN(date)) return '⋯';
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: !use24, timeZone: 'UTC' }); // we display in local, but careful: we want local time. Use toLocaleString with system zone.
      }

      // local timezone wrapper
      function localTime(date) {
        if (!date || isNaN(date)) return '⋯';
        return date; // we keep as Date obj; formatting uses local
      }

      // format duration ms -> H h M min
      function formatDuration(ms) {
        if (ms < 0) return '—';
        const hours = Math.floor(ms / 3600000);
        const minutes = Math.floor((ms % 3600000) / 60000);
        return `${hours}h ${minutes}min`;
      }

      // compute all times & update UI
      function computeAndDisplay() {
        try {
          const lat = parseFloat(latInp.value);
          const lng = parseFloat(lngInp.value);
          const dateVal = dateInp.value;
          if (isNaN(lat) || isNaN(lng) || !dateVal) return;

          const date = new Date(dateVal + 'T12:00:00'); // midday to avoid DST issues

          // get sunset (maghrib) and fajr using SunCalc
          const times = SunCalc.getTimes(date, lat, lng);
          let sunset = times.sunset;        // Maghrib
          let fajr = times.dawn;             // astronomical dawn (custom angle we adjust)

          // Recompute fajr with specific angle if necessary (SunCalc uses default 0.833° for dawn, but we want fajr angle)
          // We'll manually compute using SunCalc's getPosition and binary search or SunCalc's times with angle.
          // SunCalc supports getTimes with custom angle? Not directly. So we approximate using solar elevation angle.
          // We'll implement a simple binary search to find time when sun elevation = -angle.
          function computeFajrWithAngle(lat, lng, date, angle) {
            const targetAngle = -angle; // fajr is below horizon
            const start = new Date(date);
            start.setUTCHours(0,0,0,0);
            const end = new Date(date);
            end.setUTCHours(23,59,59,999);
            // fajr occurs before sunrise, search from midnight to noon
            let low = new Date(start);
            let high = new Date(date);
            high.setUTCHours(12,0,0,0); // limit to before noon
            for (let i=0; i<20; i++) {
              const mid = new Date((low.getTime() + high.getTime())/2);
              const pos = SunCalc.getPosition(mid, lat, lng);
              const elevation = pos.altitude * 180/Math.PI;
              if (elevation > targetAngle) {
                high = mid;
              } else {
                low = mid;
              }
            }
            return low;
          }

          const fajrAngle = getCurrentAngle();
          const customFajr = computeFajrWithAngle(lat, lng, date, fajrAngle);
          // Also recompute sunset (maghrib) - SunCalc sunset is at -0.833° (official). We keep as maghrib (shafaq). Usually Maghrib is sunset -0.833°, ok.
          // but some require slightly different? we stick to standard sunset.

          // high-latitude adjustment (customFajr may be invalid if no darkness, we adjust)
          let adjustedFajr = applyHighLatAdjustment(lat, date, sunset, customFajr, highLatSel.value);
          // Ensure fajr is after sunset
          if (adjustedFajr <= sunset) {
            // next day? add 24h?
            adjustedFajr = new Date(adjustedFajr.getTime() + 24*3600000);
          }

          // Night duration
          const nightDurationMs = adjustedFajr - sunset;
          const lastThirdStart = new Date(adjustedFajr.getTime() - nightDurationMs / 3);

          // update display
          const maghribVal = localTime(sunset);
          const fajrVal = localTime(adjustedFajr);
          const lastVal = localTime(lastThirdStart);

          maghribSpan.textContent = formatTime(maghribVal, use24);
          fajrSpan.textContent = formatTime(fajrVal, use24);
          nightDurSpan.textContent = formatDuration(nightDurationMs);
          lastThirdSpan.textContent = formatTime(lastVal, use24);
          lastThirdHighlight.textContent = formatTime(lastVal, use24);

          // countdown until next last third (if in future)
          updateCountdown(lastVal);
        } catch (e) {
          console.warn(e);
        }
      }

      function updateCountdown(targetTime) {
        if (!targetTime || isNaN(targetTime)) return;
        const now = new Date();
        let target = new Date(targetTime);
        // if target is before now, maybe add 24h? but we show generic
        if (target < now) {
          target = new Date(target.getTime() + 24*3600000);
        }
        const diff = target - now;
        if (diff > 0) {
          const hours = Math.floor(diff / 3600000);
          const mins = Math.floor((diff % 3600000) / 60000);
          const secs = Math.floor((diff % 60000) / 1000);
          countdownSpan.textContent = `🌙 last third in ${hours}h ${mins}m ${secs}s`;
        } else {
          countdownSpan.textContent = `🌙 last third is now (or passed)`;
        }
        setTimeout(() => updateCountdown(targetTime), 1000);
      }

      // geolocation
      geoBtn.addEventListener('click', () => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            latInp.value = pos.coords.latitude.toFixed(5);
            lngInp.value = pos.coords.longitude.toFixed(5);
            cityInput.value = '📍 current';
            computeAndDisplay();
          });
        } else alert('Geolocation not supported');
      });

      // simple city search (dummy – just fetch coordinates using free api)
      searchBtn.addEventListener('click', () => {
        const city = cityInput.value.trim();
        if (!city) return;
        fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`)
          .then(r => r.json())
          .then(d => {
            if (d.results && d.results[0]) {
              latInp.value = d.results[0].latitude;
              lngInp.value = d.results[0].longitude;
              computeAndDisplay();
            } else alert('City not found');
          }).catch(() => alert('Geocoding error'));
      });

      // event listeners
      [latInp, lngInp, dateInp, methodSel, customAngleInp, highLatSel].forEach(el => el.addEventListener('input', computeAndDisplay));
      window.addEventListener('load', computeAndDisplay);

      toggle12.addEventListener('click', () => { use24 = false; toggle12.classList.add('active'); toggle24.classList.remove('active'); computeAndDisplay(); });
      toggle24.addEventListener('click', () => { use24 = true; toggle24.classList.add('active'); toggle12.classList.remove('active'); computeAndDisplay(); });

      // init with mecca
      computeAndDisplay();

      // optional moon phase (tiny)
      // just a decorative note – we can show via emoji later.
    })();
  </script>
</body>
</html>
